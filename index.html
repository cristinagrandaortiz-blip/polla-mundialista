/* ═══════════════════════════════════════
   BRACKET FIFA 2026

   Grupos A-H: líderes vs subcampeones
   cruce inverso entre grupos adyacentes
     1A-2B, 1B-2A, 1C-2D, 1D-2C
     1E-2F, 1F-2E, 1G-2H, 1H-2G

   Grupos I-L: líderes vs mejores 3ros
     1I-3ro#1, 1J-3ro#2, 1K-3ro#3, 1L-3ro#4

   Grupos I-L: subcampeones vs mejores 3ros
     2I-3ro#5, 2J-3ro#6, 2K-3ro#7, 2L-3ro#8
═══════════════════════════════════════ */
/* FIXTURE OFICIAL FIFA 2026 — R32 (M73-M88)
   M73:2A-2B  M74:1E-3ro  M75:1F-2C  M76:1C-2F
   M77:1I-3ro M78:2E-2I   M79:1A-3ro M80:1L-3ro
   M81:1D-3ro M82:1G-3ro  M83:2K-2L  M84:1H-2J
   M85:1B-3ro M86:1J-2H   M87:1K-3ro M88:2D-2G
   R16 oficial: M89=W74+W77 M90=W73+W75 M91=W76+W78 M92=W79+W80
        M93=W83+W84 M94=W81+W82 M95=W86+W88 M96=W85+W87
   QF: M97=W89+W90 M98=W93+W94 M99=W91+W92 M100=W95+W96
   SF: M101=W97+W98 M102=W99+W100
   (orden interno r16: M89,M90,M93,M94,M91,M92,M95,M96 para que
    el emparejamiento secuencial reproduzca el cuadro oficial) */
const R32=[
  ["2A","2B"],    // M73 pos0
  ["1E","3rd1"],  // M74 pos1  vs 3ro (grupos A/B/C/D/F)
  ["1F","2C"],    // M75 pos2
  ["1C","2F"],    // M76 pos3
  ["1I","3rd2"],  // M77 pos4  vs 3ro (grupos C/D/F/G/H)
  ["2E","2I"],    // M78 pos5
  ["1A","3rd3"],  // M79 pos6  vs 3ro (grupos C/E/F/H/I)
  ["1L","3rd4"],  // M80 pos7  vs 3ro (grupos E/H/I/J/K)
  ["1D","3rd5"],  // M81 pos8  vs 3ro (grupos B/E/F/I/J)
  ["1G","3rd6"],  // M82 pos9  vs 3ro (grupos A/E/H/I/J)
  ["2K","2L"],    // M83 pos10
  ["1H","2J"],    // M84 pos11
  ["1B","3rd7"],  // M85 pos12 vs 3ro (grupos E/F/G/I/J)
  ["1J","2H"],    // M86 pos13
  ["1K","3rd8"],  // M87 pos14 vs 3ro (grupos D/E/I/J/L)
  ["2D","2G"],    // M88 pos15
];
/* Cruces R16 (par de índices en R32): */
const R16_PAIRS=[
  [1,4],   // M89: W74 vs W77
  [0,2],   // M90: W73 vs W75
  [10,11], // M93: W83 vs W84
  [8,9],   // M94: W81 vs W82
  [3,5],   // M91: W76 vs W78
  [6,7],   // M92: W79 vs W80
  [13,15], // M95: W86 vs W88
  [12,14], // M96: W85 vs W87
];
/* Números de partido FIFA por ronda (en el orden interno de cada arreglo) */
const M_NUMS={r32:Array.from({length:16},(_,i)=>73+i),r16:[89,90,93,94,91,92,95,96],qf:[97,98,99,100],sf:[101,102],third:[103],final:[104]};
/* Rival de cada 3ro en R32 */
const THIRD_VS=["1°E","1°I","1°A","1°L","1°D","1°G","1°B","1°K"];
/* Grupos posibles por slot de 3ro */
const THIRD_GROUPS=[
  ["A","B","C","D","F"], // slot 1 → vs 1E
  ["C","D","F","G","H"], // slot 2 → vs 1I
  ["C","E","F","H","I"], // slot 3 → vs 1A
  ["E","H","I","J","K"], // slot 4 → vs 1L
  ["B","E","F","I","J"], // slot 5 → vs 1D
  ["A","E","H","I","J"], // slot 6 → vs 1G
  ["E","F","G","I","J"], // slot 7 → vs 1B
  ["D","E","I","J","L"], // slot 8 → vs 1K
];
const sName=s=>{
  if(!s)return"TBD";
  const gm=s.match(/^([12])([A-L])$/);
  if(gm)return`${gm[1]==="1"?"1°":"2°"} G.${gm[2]}`;
  const tm=s.match(/^3rd(\d+)$/);
  if(tm){const n=+tm[1]-1;return`3ro#${tm[1]} vs ${THIRD_VS[n]||""}`;}
  return s;
};

const ROUNDS=[
  {key:"r32",  label:"16avos",    short:"16°",emoji:"⚡",count:16,wP:2},
  {key:"r16",  label:"Octavos",   short:"8°", emoji:"🔥",count:8, wP:3},

  {key:"final",label:"Final",     short:"🏆", emoji:"🏆",count:1, wP:10},
];
const MAX_PTS=155;
/* ═══ FIREBASE REST API ═══════════════════════════════
   Sin SDK. Solo fetch() — simple y sin errores de init.

   ════════════════════════════════════════════════════ */
const FIREBASE_URL="https://polla-familiar-default-rtdb.firebaseio.com";
const DB_URL=FIREBASE_URL.replace(/\/+$/,"")+"/polla2026";
const DB_CONFIGURADA=/^https:\/\/.+firebasedatabase\.app$|^https:\/\/.+firebaseio\.com$/.test(FIREBASE_URL.replace(/\/+$/,""));

async function dbGet(){
  const r=await fetch(DB_URL+".json");
  if(!r.ok)throw new Error("Firebase error: HTTP "+r.status);
  return r.json(); /* null si la BD está vacía */
}
async function dbSet(key,val){
  await fetch(DB_URL+"/"+key+".json",{
    method:"PUT",headers:{"Content-Type":"application/json"},
    body:JSON.stringify(val)
  });
}

/* Arrays en Firebase se convierten a objetos {0:..,1:..} — esto los revierte */
function toArr(x){
  if(!x)return[];
  if(Array.isArray(x))return x;
  return Object.keys(x).sort((a,b)=>+a-+b).map(k=>x[k]);
}
function fixData(raw){
  if(!raw)return createDef();
  const d=createDef();
  d.players=toArr(raw.players);
  d.predictions={};
  Object.entries(raw.predictions||{}).forEach(([id,pr])=>{
    if(!pr)return;
    d.predictions[id]={groups:pr.groups||{},thirds:toArr(pr.thirds),knockout:{}};
    ROUNDS.forEach(({key})=>{ d.predictions[id].knockout[key]=toArr(pr.knockout?.[key]); });
  });
  if(raw.actual){
    d.actual.groups=raw.actual.groups||{};
    d.actual.thirds=toArr(raw.actual.thirds);
    d.actual.knockout={};
    ROUNDS.forEach(({key})=>{ d.actual.knockout[key]=toArr(raw.actual.knockout?.[key]); });
  }
  if(raw.settings) d.settings={...d.settings,...raw.settings,
    phases:{...d.settings.phases,...(raw.settings.phases||{})}};
  return d;
}
const T0=new Date("2026-06-11T23:59:00-05:00"); /* cierre: medianoche de Ecuador */

const genId=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const enc=o=>btoa(unescape(encodeURIComponent(JSON.stringify(o))));
const dec=s=>{try{return JSON.parse(decodeURIComponent(escape(atob(s))))}catch{return null}};
const mkKO=()=>Object.fromEntries(ROUNDS.map(({key,count})=>[key,Array.from({length:count},()=>({homeScore:"",awayScore:"",winner:""}))]) );
const mkPred=()=>({groups:Object.fromEntries(GK.map(g=>[g,{first:"",second:""}])),thirds:Array(8).fill(""),knockout:mkKO()});

function createDef(){return{
  players:[],predictions:{},
  actual:{
    groups:Object.fromEntries(GK.map(g=>[g,{first:"",second:"",third:""}])),
    thirds:Array(8).fill(""),knockout:mkKO()
  },
  settings:{phases:{groups:true,...Object.fromEntries(ROUNDS.map(r=>[r.key,false]))},adminPass:"mundial2026",potAmount:5}
};}

function loadData(){return createDef();}

/* ── Bracket logic ───────────────────── */
function getAvailThirds(predGroups,thirds,idx){
  const qual=new Set();
  GK.forEach(g=>{if(predGroups?.[g]?.first)qual.add(predGroups[g].first);if(predGroups?.[g]?.second)qual.add(predGroups[g].second);});
  const usedG=new Set();
  thirds.forEach((t,i)=>{if(i!==idx&&t&&TEAM_GROUP[t])usedG.add(TEAM_GROUP[t]);});
  return ALL_TEAMS.filter(t=>t&&!qual.has(t)&&!usedG.has(TEAM_GROUP[t]));
}

function rSlotUser(slot,pred){
  if(!slot)return"";
  const gm=slot.match(/^([12])([A-L])$/);
  if(gm)return pred.groups?.[gm[2]]?.[gm[1]==="1"?"first":"second"]||"";
  const tm=slot.match(/^3rd(\d+)$/);
  if(tm)return pred.thirds?.[+tm[1]-1]||"";
  return"";
}
function rSlotActual(slot,actual){
  if(!slot)return"";
  const gm=slot.match(/^([12])([A-L])$/);
  if(gm)return actual.groups?.[gm[2]]?.[gm[1]==="1"?"first":"second"]||"";
  const tm=slot.match(/^3rd(\d+)$/);
  if(tm)return actual.thirds?.[+tm[1]-1]||"";
  return"";
}

function computeUserTeams(pred){
  const ko=pred?.knockout||mkKO();
  const r32=R32.map(([h,a])=>({home:rSlotUser(h,pred),away:rSlotUser(a,pred)}));
  const r16=R16_PAIRS.map(([hi,ai])=>({home:ko.r32?.[hi]?.winner||"",away:ko.r32?.[ai]?.winner||""}));
  const qf=Array.from({length:4},(_,i)=>({home:ko.r16?.[i*2]?.winner||"",away:ko.r16?.[i*2+1]?.winner||""}));
  const sf=Array.from({length:2},(_,i)=>({home:ko.qf?.[i*2]?.winner||"",away:ko.qf?.[i*2+1]?.winner||""}));
  const sfL=i=>{const m=sf[i];const w=ko.sf?.[i]?.winner;if(!m?.home||!w)return"";return w===m.home?m.away:m.home;};
  return{r32,r16,qf,sf,third:[{home:sfL(0),away:sfL(1)}],final:[{home:ko.sf?.[0]?.winner||"",away:ko.sf?.[1]?.winner||""}]};
}
function computeActualTeams(actual){
  const ko=actual?.knockout||mkKO();
  const r32=R32.map(([h,a])=>({home:rSlotActual(h,actual),away:rSlotActual(a,actual)}));
  const r16=R16_PAIRS.map(([hi,ai])=>({home:ko.r32?.[hi]?.winner||"",away:ko.r32?.[ai]?.winner||""}));
  const qf=Array.from({length:4},(_,i)=>({home:ko.r16?.[i*2]?.winner||"",away:ko.r16?.[i*2+1]?.winner||""}));
  const sf=Array.from({length:2},(_,i)=>({home:ko.qf?.[i*2]?.winner||"",away:ko.qf?.[i*2+1]?.winner||""}));
  const sfL=i=>{const m=sf[i];const w=ko.sf?.[i]?.winner;if(!m?.home||!w)return"";return w===m.home?m.away:m.home;};
  return{r32,r16,qf,sf,third:[{home:sfL(0),away:sfL(1)}],final:[{home:ko.sf?.[0]?.winner||"",away:ko.sf?.[1]?.winner||""}]};
}

function calcScore(pred,actual){
  if(!pred)return{total:0,details:[]};
  let total=0;const details=[];
  GK.forEach(g=>{
    const p=pred.groups?.[g];const a=actual.groups?.[g];if(!p||!a)return;
    if(a.first&&p.first===a.first){total+=3;details.push({l:`1° Grupo ${g}: ${fl(p.first)}`,pts:3,star:false});}
    if(a.second&&p.second===a.second){total+=2;details.push({l:`2° Grupo ${g}: ${fl(p.second)}`,pts:2,star:false});}
  });
  ROUNDS.forEach(({key,label,wP})=>{
    const pr=pred.knockout?.[key]||[];const ar=actual.knockout?.[key]||[];
    pr.forEach((pm,i)=>{
      const am=ar[i];if(!am?.winner||!pm?.winner)return;
      if(pm.winner===am.winner){
        total+=wP;details.push({l:`${label} P${i+1}: ${fl(pm.winner)}`,pts:wP,star:false});
      }
    });
  });
  return{total,details};
}
const isLocked=data=>T0<=new Date();
const phLocked=(data,key)=>isLocked(data)||!data.settings.phases[key];

const Card=({children,style={}})=><div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:14,...style}}>{children}</div>;

const Flash=({msg})=>msg?<div style={{background:"rgba(34,197,94,0.15)",border:"1px solid rgba(34,197,94,0.3)",borderRadius:10,padding:"10px 14px",fontSize:13,color:"#4ade80",fontWeight:700,marginBottom:12}}>{msg}</div>:null;

function Countdown(){
  const[d,set]=useState(T0-Date.now());
  useEffect(()=>{const t=setInterval(()=>set(T0-Date.now()),1000);return()=>clearInterval(t);},[]);
  if(d<=0)return<div style={{textAlign:"center",color:"#4ade80",fontWeight:800}}>⚽ ¡El Mundial 2026 ha comenzado!</div>;
  const[dd,dh,dm,ds]=[Math.floor(d/86400000),Math.floor(d%86400000/3600000),Math.floor(d%3600000/60000),Math.floor(d%60000/1000)];
  return<div style={{display:"flex",gap:6,justifyContent:"center"}}>{[[dd,"d"],[dh,"h"],[dm,"m"],[ds,"s"]].map(([v,l])=><div key={l} style={{textAlign:"center",background:"rgba(250,204,21,0.08)",border:"1px solid rgba(250,204,21,0.18)",borderRadius:8,padding:"6px 8px",minWidth:44}}><div style={{fontWeight:900,fontSize:18,color:"#facc15",lineHeight:1}}>{String(v).padStart(2,"0")}</div><div style={{fontSize:9,color:"#64748b",marginTop:2}}>{l}</div></div>)}</div>;
}

/* ── MatchCard ─────────────────────────── */
function MatchCard({label,slotDesc,homeTeam,awayTeam,pred,onChange,locked,actualResult}){
  const hasBoth=!!(homeTeam&&awayTeam);
  const winner=pred?.winner||"";
  const cW=!!actualResult?.winner&&winner===actualResult.winner;
  const border=actualResult?.winner?(cW?"rgba(34,197,94,0.4)":"rgba(248,113,113,0.3)"):"rgba(255,255,255,0.08)";
  const pick=team=>{
    if(!onChange||locked||!hasBoth)return;
    onChange({...(pred||{}),homeScore:"",awayScore:"",winner:winner===team?"":team});
  };
  const TeamBtn=({team})=>{
    const sel=!!team&&winner===team;
    return(
      <button onClick={()=>pick(team)} disabled={locked||!hasBoth}
        style={{flex:1,minWidth:0,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"10px 4px",
          background:sel?"rgba(250,204,21,0.16)":"rgba(255,255,255,0.03)",
          border:sel?"1.5px solid #facc15":"1px solid rgba(255,255,255,0.1)",
          borderRadius:11,cursor:(locked||!hasBoth)?"default":"pointer",
          opacity:(locked&&!sel)||!hasBoth?0.45:1}}>
        <div style={{fontSize:26,lineHeight:1.1}}>{team?F(team):"❓"}</div>
        <div style={{fontSize:11,fontWeight:sel?800:600,color:sel?"#facc15":hasBoth?"white":"#475569",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"100%"}}>{team||"TBD"}</div>
      </button>
    );
  };
  return(
    <div style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${border}`,borderRadius:14,padding:12,marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
        <span style={{fontSize:9,color:"#64748b",fontWeight:700}}>{label}</span>
        {slotDesc&&<span style={{fontSize:9,color:"#334155"}}>{slotDesc}</span>}
      </div>
      <div style={{display:"flex",alignItems:"stretch",gap:8}}>
        <TeamBtn team={homeTeam}/>
        <div style={{alignSelf:"center",color:"#64748b",fontSize:11,fontWeight:800,flexShrink:0}}>vs</div>
        <TeamBtn team={awayTeam}/>
      </div>
      <div style={{marginTop:8,textAlign:"center"}}>
        {hasBoth?(winner?(
          <div style={{fontSize:11,color:"#94a3b8"}}>Gana: <strong style={{color:"#facc15"}}>{fl(winner)}</strong></div>
        ):(
          <div style={{fontSize:10,color:"#475569"}}>{locked?"Sin pronóstico":"Toca al equipo que crees que ganará"}</div>
        )):(
          <div style={{fontSize:10,color:"#475569"}}>Completa los picks anteriores para ver los equipos</div>
        )}
      </div>
      {actualResult?.winner&&(
        <div style={{marginTop:8,background:"rgba(0,0,0,0.25)",borderRadius:8,padding:"6px 10px"}}>
          <div style={{fontSize:10,color:"#64748b"}}>Ganó: {fl(actualResult.winner)}</div>
          <div style={{fontSize:11,marginTop:3}}>
            <span style={{color:cW?"#4ade80":"#f87171"}}>{cW?"✓ ¡Acertaste!":"✗ No acertaste"}</span>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── CodePanel ──────────────────────── */
function CodePanel({session,form,locked,onSave,saved}){

  const userTeams=useMemo(()=>computeUserTeams(form),[form]);
  const actualTeams=useMemo(()=>computeActualTeams(data.actual),[data.actual]);

  if(!session)return<div style={{padding:16}}><Card style={{textAlign:"center",padding:32}}><div style={{fontSize:32,marginBottom:12}}>🏆</div><div style={{fontWeight:700,marginBottom:12}}>Inicia sesión para simular el bracket</div><div style={{display:"flex",gap:8}}><button onClick={()=>setView("register")} style={{flex:1,padding:"12px",background:"#facc15",borderRadius:10,border:"none",color:"#000",fontWeight:700,cursor:"pointer"}}>Registrarme</button><button onClick={()=>setView("home")} style={{flex:1,padding:"12px",background:"rgba(255,255,255,0.06)",borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",color:"white",fontWeight:700,cursor:"pointer"}}>Entrar</button></div></Card></div>;

  const ri=ROUNDS.find(r=>r.key===activeR);
  const locked=isLocked(data); /* usuario puede simular todas las rondas libremente hasta el inicio del torneo */
  const teams=userTeams[activeR]||[];
  const gDone=Object.values(form.groups).filter(g=>g.first&&g.second).length;
  const t3Done=(form.thirds||[]).filter(Boolean).length;
  const canSim=gDone===12&&t3Done===8;
  const rPicks=(form.knockout?.[activeR]||[]).filter(m=>m.winner).length;

  const updMatch=(idx,val)=>setForm(f=>{
    const ko={...f.knockout};
    const arr=[...(ko[activeR]||[])];
    arr[idx]={...(arr[idx]||{}),...val};
    ko[activeR]=arr;return{...f,knockout:ko};
  });
  const save=()=>{onSave(session.playerId,form);setSaved(true);setTimeout(()=>setSaved(false),2500);};

  return(
    <div style={{padding:16}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{fontWeight:900,fontSize:18}}>🏆 Bracket</div>
        <Pill locked={locked}/>
      </div>
      {!canSim&&<div style={{background:"rgba(250,204,21,0.08)",border:"1px solid rgba(250,204,21,0.2)",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#fbbf24",marginBottom:12}}>⚠️ Completa primero <strong>Mis Picks</strong> ({12-gDone} grupos y {8-t3Done} 3ros pendientes) para que aparezcan los equipos.</div>}
      {/* Round tabs */}
      <div style={{display:"flex",gap:3,marginBottom:10,overflowX:"auto",paddingBottom:4}}>
        {ROUNDS.map(r=>{
          const done=(form.knockout?.[r.key]||[]).filter(m=>m.winner).length===r.count&&r.count>0;
          const some=(form.knockout?.[r.key]||[]).some(m=>m.winner);
          const active=activeR===r.key;
          return<button key={r.key} onClick={()=>setActiveR(r.key)}
            style={{flexShrink:0,padding:"7px 10px",borderRadius:9,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:active?"#facc15":done?"rgba(34,197,94,0.15)":some?"rgba(250,204,21,0.1)":"rgba(255,255,255,0.04)",color:active?"#000":done?"#4ade80":some?"#fbbf24":"#475569"}}>
            {r.emoji} {r.short}
          </button>;
        })}
      </div>
      <Card style={{marginBottom:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><span style={{fontWeight:800,fontSize:13}}>{ri?.emoji} {ri?.label}</span><span style={{fontSize:10,color:"#64748b",marginLeft:10}}>{rPicks}/{ri?.count}</span></div>
        <div style={{fontSize:10,color:"#64748b"}}>{ri?.wP} pts por acierto</div>
      </Card>
      {activeR==="r32"&&<div style={{background:"rgba(59,130,246,0.06)",border:"1px solid rgba(59,130,246,0.2)",borderRadius:10,padding:"8px 12px",fontSize:11,color:"#93c5fd",marginBottom:12}}>⚽ <strong>FIFA 2026 oficial:</strong> Líderes vs 3ros en M74,M77,M79-M82,M85,M87 · Subcampeones entre sí en M73,M78,M83,M88 · Cruces en M75,M76,M84,M86</div>}
      {teams.map((m,i)=>{
        const sDesc=activeR==="r32"?`${sName(R32[i][0])} vs ${sName(R32[i][1])}`:"";
        const aM=data.actual.knockout?.[activeR]?.[i];
        return<MatchCard key={i} label={`${ri?.emoji} ${ri?.label} · M${M_NUMS[activeR][i]}`} slotDesc={sDesc}
          homeTeam={m.home} awayTeam={m.away}
          pred={form.knockout?.[activeR]?.[i]}
          onChange={!locked?(val=>updMatch(i,val)):null}
          locked={locked} actualResult={aM?.winner?aM:null}/>;
      })}
      {rPicks===ri?.count&&ri?.count>0&&activeR!=="final"&&<div style={{background:"rgba(34,197,94,0.08)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#4ade80",marginTop:4}}>✅ Ronda completa — pasa a la siguiente.</div>}
      {activeR==="final"&&form.knockout?.final?.[0]?.winner&&(
        <div style={{background:"linear-gradient(135deg,rgba(250,204,21,0.15),rgba(245,158,11,0.08))",border:"1px solid rgba(250,204,21,0.3)",borderRadius:14,padding:"16px 14px",textAlign:"center",marginTop:8}}>
          <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>🏆 Tu campeón del mundo</div>
          <div style={{fontWeight:900,fontSize:24,color:"#facc15"}}>{fl(form.knockout.final[0].winner)}</div>
          <div style={{fontSize:11,color:"#64748b",marginTop:4}}>¡Simulación completa!</div>
        </div>
      )}
      <CodePanel session={session} form={form} locked={locked} onSave={save} saved={saved}/>
    </div>
  );
}

function ScoreView({data,session,setView}){
  const{predictions,actual}=data;
  if(!session)return<div style={{padding:16}}><Card style={{textAlign:"center",padding:32}}><div style={{fontSize:32,marginBottom:12}}>📊</div><div style={{fontWeight:700,marginBottom:12}}>Inicia sesión para ver tu score</div><button onClick={()=>setView("home")} style={{width:"100%",padding:"12px",background:"#facc15",borderRadius:10,border:"none",color:"#000",fontWeight:700,cursor:"pointer"}}>Inicio</button></Card></div>;
  const pred=predictions[session.playerId];
  const score=calcScore(pred,actual);
  const userTeams=pred?computeUserTeams(pred):null;
  if(!pred?.groups)return<div style={{padding:16}}><div style={{fontWeight:900,fontSize:20,marginBottom:16}}>📊 Mi score</div><Card><div style={{textAlign:"center",padding:"32px 0",color:"#64748b"}}>Aún no tienes predicciones.</div></Card></div>;
  return(
    <div style={{padding:16}}>
      <div style={{fontWeight:900,fontSize:20,marginBottom:12}}>📊 Mi score</div>
      <Card style={{textAlign:"center",marginBottom:14,background:"linear-gradient(135deg,rgba(250,204,21,0.1),rgba(245,158,11,0.04))",border:"1px solid rgba(250,204,21,0.2)"}}>
        <div style={{fontWeight:900,fontSize:56,color:"#facc15",lineHeight:1}}>{score.total}</div>
        <div style={{fontSize:13,color:"#94a3b8",marginTop:2}}>de {MAX_PTS} pts posibles</div>
        <div style={{margin:"10px 0 4px",background:"rgba(255,255,255,0.08)",borderRadius:99,height:7,overflow:"hidden"}}>
          <div style={{width:`${Math.min(score.total/MAX_PTS*100,100)}%`,background:"linear-gradient(90deg,#facc15,#f59e0b)",height:"100%",borderRadius:99}}/>
        </div>
        <div style={{fontSize:10,color:"#64748b"}}>{Math.round(score.total/MAX_PTS*100)}% del máximo</div>
      </Card>
      {pred.knockout?.final?.[0]?.winner&&(
        <Card style={{marginBottom:12,textAlign:"center",background:"rgba(250,204,21,0.06)",border:"1px solid rgba(250,204,21,0.2)"}}>
          <div style={{fontSize:10,color:"#64748b",marginBottom:4}}>🏆 Tu campeón simulado</div>
          <div style={{fontWeight:900,fontSize:18,color:"#facc15"}}>{fl(pred.knockout.final[0].winner)}</div>
          {actual.knockout?.final?.[0]?.winner&&<div style={{fontSize:11,marginTop:6,color:pred.knockout.final[0].winner===actual.knockout.final[0].winner?"#4ade80":"#f87171"}}>{pred.knockout.final[0].winner===actual.knockout.final[0].winner?"🎉 ¡Acertaste el campeón!":"Real: "+fl(actual.knockout.final[0].winner)}</div>}
        </Card>
      )}
      {score.details.length>0&&<>
        <SH mt={0}>✅ ACIERTOS</SH>
        {score.details.map((d,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:d.star?"rgba(250,204,21,0.08)":"rgba(34,197,94,0.08)",border:`1px solid ${d.star?"rgba(250,204,21,0.2)":"rgba(34,197,94,0.2)"}`,borderRadius:9,marginBottom:5}}><span style={{fontSize:12}}>{d.l}</span><span style={{fontWeight:800,color:d.star?"#facc15":"#4ade80",fontSize:14,marginLeft:8}}>+{d.pts}</span></div>)}
      </>}
      <SH>📋 GRUPOS</SH>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
        {GK.map(g=>{
          const p=pred.groups?.[g];const ar=actual.groups?.[g];
          const c1=ar?.first&&p?.first===ar.first;const c2=ar?.second&&p?.second===ar.second;
          return<div key={g} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:9,padding:"8px 10px"}}>
            <div style={{fontSize:10,color:"#64748b",fontWeight:700,marginBottom:4}}>Grupo {g}</div>
            {[["first","1°",c1,3],["second","2°",c2,2]].map(([pos,lbl,ok,pts])=><div key={pos} style={{fontSize:11,display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
              <span style={{color:!ar?.[pos]?"#334155":ok?"#4ade80":"#f87171",fontSize:12}}>{!ar?.[pos]?"·":ok?"✓":"✗"}</span>
              <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:ok?"white":"#64748b"}}>{lbl} {p?.[pos]?fl(p[pos]):"—"}</span>
              {ok&&<span style={{color:"#4ade80",fontWeight:700,fontSize:10}}>+{pts}</span>}
            </div>)}
          </div>;
        })}
      </div>
      {ROUNDS.map(({key,label,emoji})=>{
        const pR=pred.knockout?.[key]||[];const aR=actual.knockout?.[key]||[];const ts=userTeams?.[key]||[];
        if(!pR.some(m=>m.winner)&&!aR.some(m=>m.winner))return null;
        return<div key={key}><SH>{emoji} {label.toUpperCase()}</SH>
          {ts.map((m,i)=><MatchCard key={i} label={`${label} P${i+1}`} homeTeam={m.home} awayTeam={m.away} pred={pR[i]} locked={true} actualResult={aR[i]?.winner?aR[i]:null}/>)}
        </div>;
      })}
    </div>
  );
}

                <option value="">—</option>

function AdminBracketTab({data,onUpdate}){
  const[activeR,setActiveR]=useState("r32");
  const actualTeams=useMemo(()=>computeActualTeams(data.actual),[data.actual]);
  const ri=ROUNDS.find(r=>r.key===activeR);

  /* Carga UNA ronda desde el store */
  const mkRound=r=>Array.from(
    {length:ROUNDS.find(x=>x.key===r)?.count||0},
    (_,i)=>({...(data.actual.knockout[r]?.[i]||{homeScore:"",awayScore:"",winner:""})})
  );
  const[roundData,setRoundData]=useState(()=>mkRound("r32"));
  const[saved,setSaved]=useState(false);

  /* Al cambiar ronda: recarga datos guardados */
  const switchRound=r=>{setActiveR(r);setRoundData(mkRound(r));};

  const updM=(idx,val)=>setRoundData(arr=>{const next=[...arr];next[idx]={...(next[idx]||{}),...val};return next;});

  /* CORREGIDO: guarda SOLO la ronda activa */
  const save=()=>{
    onUpdate({actual:{...data.actual,knockout:{...data.actual.knockout,[activeR]:roundData}}});
    setSaved(true);setTimeout(()=>setSaved(false),2500);
  };

  const teams=actualTeams[activeR]||[];
  const missingG=GK.filter(g=>!data.actual.groups[g]?.first||!data.actual.groups[g]?.second).length;
  const missingT=data.actual.thirds.filter(t=>!t).length;

  return(
    <div>
      {saved&&<Flash msg="✓ Guardado"/>}
      {activeR==="r32"&&(missingG>0||missingT>0)&&(
        <div style={{background:"rgba(251,191,36,0.08)",border:"1px solid rgba(251,191,36,0.3)",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#fbbf24",marginBottom:12}}>
          ⚠️ Faltan datos en <strong>📋 Grupos</strong>:{missingG>0?` ${missingG} grupo(s) sin 1°/2°`:""}{missingG>0&&missingT>0?" ·":""}{missingT>0?` ${missingT} de los 8 mejores 3ros`:""}.
          Los partidos incompletos quedan bloqueados.
        </div>
      )}
      <div style={{display:"flex",gap:3,marginBottom:12,overflowX:"auto",paddingBottom:4}}>
        {ROUNDS.map(r=>{
          const ko=data.actual.knockout[r.key]||[];
          const done=ko.length>0&&ko.every(m=>m.winner);
          return<button key={r.key} onClick={()=>switchRound(r.key)}
            style={{flexShrink:0,padding:"7px 10px",borderRadius:9,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,
              background:activeR===r.key?"#facc15":"rgba(255,255,255,0.06)",
              color:activeR===r.key?"#000":done?"#4ade80":"#64748b"}}>
            {done&&activeR!==r.key?"✓ ":""}{r.emoji} {r.short}
          </button>;
        })}
      </div>
      <Card style={{padding:"10px 14px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontWeight:800,fontSize:13}}>{ri?.emoji} {ri?.label}</div>
        <div style={{fontSize:10,color:"#64748b"}}>{ri?.count} partidos · guarda antes de cambiar ronda</div>
      </Card>
      {teams.some(m=>m.home||m.away)?teams.map((m,i)=>
        <MatchCard key={i} label={`${ri?.emoji} ${ri?.label} · M${M_NUMS[activeR][i]}`} slotDesc={activeR==="r32"?`${sName(R32[i][0])} vs ${sName(R32[i][1])}`:""}
          homeTeam={m.home} awayTeam={m.away} pred={roundData[i]} onChange={val=>updM(i,val)} locked={false}/>
      ):<Card style={{textAlign:"center",padding:"20px 0",color:"#475569"}}><div style={{fontSize:13}}>Completa las fases anteriores primero.</div></Card>}
      <button onClick={save} style={{width:"100%",padding:"13px",background:"#facc15",borderRadius:12,border:"none",color:"#000",fontWeight:800,fontSize:14,cursor:"pointer",marginTop:8}}>💾 Guardar {ri?.label}</button>
    </div>
  );
}

const OF_URL="https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json";
const EN2ES={"Mexico":"México","South Africa":"Sudáfrica","South Korea":"Corea del Sur","Czech Republic":"Chequia",
"Canada":"Canadá","Bosnia & Herzegovina":"Bosnia Herz.","Qatar":"Qatar","Switzerland":"Suiza",
"Brazil":"Brasil","Morocco":"Marruecos","Haiti":"Haití","Scotland":"Escocia",
"USA":"EE. UU.","Paraguay":"Paraguay","Australia":"Australia","Turkey":"Turquía",
"Germany":"Alemania","Curaçao":"Curaçao","Ivory Coast":"Costa de Marfil","Ecuador":"Ecuador",
"Netherlands":"Países Bajos","Japan":"Japón","Sweden":"Suecia","Tunisia":"Túnez",
"Belgium":"Bélgica","Egypt":"Egipto","Iran":"Irán","New Zealand":"Nueva Zelanda",
"Spain":"España","Cape Verde":"Cabo Verde","Saudi Arabia":"Arabia Saudí","Uruguay":"Uruguay",
"France":"Francia","Senegal":"Senegal","Norway":"Noruega","Iraq":"Irak",
"Argentina":"Argentina","Algeria":"Argelia","Austria":"Austria","Jordan":"Jordania",
"Portugal":"Portugal","DR Congo":"Congo RD","Uzbekistan":"Uzbekistán","Colombia":"Colombia",
"England":"Inglaterra","Croatia":"Croacia","Ghana":"Ghana","Panama":"Panamá"};
const THIRD_SLOT_R32_IDX=[1,4,6,7,8,9,12,14]; /* índices en R32 donde juega cada 3ro (slots 1..8) */

function ofWinner(m){
  const es=t=>EN2ES[t]||"";
  const t1=es(m.team1),t2=es(m.team2);
  if(!t1||!t2)return null;
  const sc=m.score||{};
  const pick=(arr)=>Array.isArray(arr)&&arr.length===2&&arr[0]!==arr[1]?(arr[0]>arr[1]?t1:t2):null;
  return pick(sc.p)||pick(sc.et)||pick(sc.ft);
}
function ofImport(raw,actual){
  const matches=raw.matches||[];
  const nuevo=JSON.parse(JSON.stringify(actual));
  const resumen={grupos:0,terceros:0,ko:0};
  /* 1) tablas de grupos con partidos jugados */
  GK.forEach(g=>{
    const ms=matches.filter(m=>m.group==="Group "+g&&Array.isArray(m.score?.ft));
    if(ms.length<6)return; /* solo cuando el grupo terminó */
    const tabla={};
    GROUPS[g].forEach(t=>tabla[t]={pts:0,gd:0,gf:0});
    let ok=true;
    ms.forEach(m=>{
      const a=EN2ES[m.team1],b=EN2ES[m.team2];
      if(!tabla[a]||!tabla[b]){ok=false;return;}
      const[ga,gb]=m.score.ft;
      tabla[a].gf+=ga;tabla[a].gd+=ga-gb;tabla[b].gf+=gb;tabla[b].gd+=gb-ga;
      if(ga>gb)tabla[a].pts+=3;else if(gb>ga)tabla[b].pts+=3;else{tabla[a].pts++;tabla[b].pts++;}
    });
    if(!ok)return;
    const orden=GROUPS[g].slice().sort((x,y)=>tabla[y].pts-tabla[x].pts||tabla[y].gd-tabla[x].gd||tabla[y].gf-tabla[x].gf);
    nuevo.groups[g]={first:orden[0],second:orden[1],third:orden[2]};
    resumen.grupos++;
  });
  /* 2) terceros reales: cuando FIFA resuelve los cruces, los 16avos traen al equipo real */
  matches.filter(m=>m.num>=73&&m.num<=88).forEach(m=>{
    const slot=THIRD_SLOT_R32_IDX.indexOf(m.num-73);
    if(slot<0)return;
    const t=EN2ES[m.team2];
    if(t){nuevo.thirds[slot]=t;resumen.terceros++;}
  });
  /* 3) ganadores de eliminatorias */
  matches.forEach(m=>{
    let rk=null,idx=0;
    if(m.num>=73&&m.num<=88){rk="r32";idx=m.num-73;}
    else if(m.num>=89&&m.num<=96){rk="r16";idx={89:0,90:1,91:4,92:5,93:2,94:3,95:6,96:7}[m.num];}
    else if(m.num>=97&&m.num<=100){rk="qf";idx=m.num-97;}
    else if(m.num>=101&&m.num<=102){rk="sf";idx=m.num-101;}
    else if(m.round==="Match for third place"){rk="third";idx=0;}
    else if(m.round==="Final"){rk="final";idx=0;}
    if(!rk)return;
    const w=ofWinner(m);
    if(w){nuevo.knockout[rk][idx]={...(nuevo.knockout[rk][idx]||{}),homeScore:"",awayScore:"",winner:w};resumen.ko++;}
  });
  return{nuevo,resumen};
}

const R32_VIS=[1,4,0,2,10,11,8,9,3,5,6,7,13,15,12,14];
const R32_LBL=["M74","M77","M73","M75","M83","M84","M81","M82","M76","M78","M79","M80","M86","M88","M85","M87"];
const R16_LBL=["M89","M90","M93","M94","M91","M92","M95","M96"];
const QF_LBL=["M97","M98","M99","M100"];
const SF_LBL=["SF1\u00b7Dallas","SF2\u00b7Atlanta"];

function BracketTreeView({data,session}){
  const[showReal,setShowReal]=useState(false);
  const pred=data.predictions[session?.playerId];
  const uTeams=pred?computeUserTeams(pred):computeUserTeams(mkPred());
  const aTeams=computeActualTeams(data.actual);
  const uKO=pred?.knockout||mkKO();
  const aKO=data.actual.knockout||mkKO();
  const teams=showReal?aTeams:uTeams;
  const koData=showReal?aKO:uKO;

  /* ── layout constants ─────────────────── */
  const TH=17,MH=TH*2,MW=126,MG=4,BG=MH+MG,CG=22,LH=13;

  /* y-center de cada partido */
  const r32Y=R32_VIS.map((_,i)=>{const g=Math.floor(i/2),p=i%2;return g*(2*MH+MG+BG)+p*(MH+MG)+TH;});
  const r16Y=Array.from({length:8},(_,i)=>(r32Y[i*2]+r32Y[i*2+1])/2);
  const qfY=Array.from({length:4},(_,i)=>(r16Y[i*2]+r16Y[i*2+1])/2);
  const sfY=Array.from({length:2},(_,i)=>(qfY[i*2]+qfY[i*2+1])/2);
  const finY=(sfY[0]+sfY[1])/2;
  const thirdY=sfY[1]+BG+4;
  const totalH=Math.max(r32Y[15]+TH+10,thirdY+TH+10);
  const colX=[0,MW+CG,2*(MW+CG),3*(MW+CG),4*(MW+CG)];
  const totalW=colX[4]+MW+10;

  const gM=(rk,i)=>{
    const t=teams[rk]?.[i]||{};const k=koData[rk]?.[i]||{};
    return{home:t.home||'',away:t.away||'',hs:k.homeScore!==undefined&&k.homeScore!==''?k.homeScore:'',as:k.awayScore!==undefined&&k.awayScore!==''?k.awayScore:'',winner:k.winner||''};
  };

  /* ── match card ── */
  const MC=({x,y,home,away,hs,as:aw,winner,lbl})=>{
    const wH=!!(winner&&winner===home),wA=!!(winner&&winner===away);
    const has=!!(home&&away);
    return(
      <g>
        {lbl&&<text x={x+2} y={y-TH-2} fontSize={7} fill="#4a5568" fontWeight="bold" fontFamily="system-ui">{lbl}</text>}
        <rect x={x} y={y-TH} width={MW} height={MH} rx={3}
          fill={has?"#0b1427":"#060c1a"}
          stroke={has?"rgba(255,255,255,0.09)":"rgba(255,255,255,0.03)"} strokeWidth={0.5}/>
        {wH&&<rect x={x} y={y-TH} width={MW} height={TH} rx={3} fill="rgba(250,204,21,0.13)"/>}
        {wA&&<rect x={x} y={y} width={MW} height={TH} rx={3} fill="rgba(250,204,21,0.13)"/>}
        <line x1={x+2} y1={y} x2={x+MW-2} y2={y} stroke="rgba(255,255,255,0.06)" strokeWidth={0.5}/>
        {/* home row */}
        <foreignObject x={x+3} y={y-TH} width={hs!==''?MW-18:MW-4} height={TH}>
          <div xmlns="http://www.w3.org/1999/xhtml" style={{fontSize:10,lineHeight:`${TH}px`,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',color:wA?'#2d3748':wH?'#facc15':'#cbd5e0',fontFamily:'system-ui,sans-serif',fontWeight:wH?700:400}}>
            {home?`${F(home)} ${home}`:'—'}
          </div>
        </foreignObject>
        {hs!==''&&<text x={x+MW-3} y={y-3} fontSize={9} textAnchor="end" fill={wH?"#facc15":"#4a5568"}>{hs}</text>}
        {/* away row */}
        <foreignObject x={x+3} y={y} width={aw!==''?MW-18:MW-4} height={TH}>
          <div xmlns="http://www.w3.org/1999/xhtml" style={{fontSize:10,lineHeight:`${TH}px`,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',color:wH?'#2d3748':wA?'#facc15':'#cbd5e0',fontFamily:'system-ui,sans-serif',fontWeight:wA?700:400}}>
            {away?`${F(away)} ${away}`:'—'}
          </div>
        </foreignObject>
        {aw!==''&&<text x={x+MW-3} y={y+TH-3} fontSize={9} textAnchor="end" fill={wA?"#facc15":"#4a5568"}>{aw}</text>}
      </g>
    );
  };

  /* ── connector path ── */
  const Cn=({x1,y1,x2,y2})=>{
    const mx=(x1+x2)/2;
    return<path d={`M${x1} ${y1}H${mx}V${y2}H${x2}`} fill="none" stroke="rgba(30,55,100,0.85)" strokeWidth={1}/>;
  };

  const ROUND_HDRS=[['16avos',0],['Octavos',1],['Cuartos',2],['Semis',3],['Final',4]];

  return(
    <div style={{paddingBottom:8}}>
      {/* Header */}
      <div style={{padding:'10px 16px 8px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{fontWeight:900,fontSize:16}}>🗺️ Llaves del Torneo</div>
        <div style={{display:'flex',gap:5}}>
          {session&&pred&&<button onClick={()=>setShowReal(false)} style={{padding:'4px 10px',borderRadius:8,border:'none',cursor:'pointer',fontSize:10,fontWeight:700,background:!showReal?'rgba(168,85,247,0.25)':'rgba(255,255,255,0.05)',color:!showReal?'#c084fc':'#475569'}}>👤 Mis picks</button>}
          <button onClick={()=>setShowReal(true)} style={{padding:'4px 10px',borderRadius:8,border:'none',cursor:'pointer',fontSize:10,fontWeight:700,background:showReal?'rgba(34,197,94,0.2)':'rgba(255,255,255,0.05)',color:showReal?'#4ade80':'#475569'}}>⚽ Real</button>
        </div>
      </div>
      {!session&&<div style={{padding:'0 16px 8px',fontSize:11,color:'#475569'}}>Inicia sesi\u00f3n para ver tu simulaci\u00f3n personal.</div>}
      {/* Bracket SVG */}
      <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch',padding:'0 6px 4px'}}>
        <svg width={totalW} height={totalH+LH+6} style={{display:'block',minWidth:totalW}}>
          {/* Column headers */}
          {ROUND_HDRS.map(([l,ci])=>(
            <text key={l} x={colX[ci]+MW/2} y={11} textAnchor="middle" fontSize={8} fill="#4a5568" fontWeight="700" fontFamily="system-ui">{l}</text>
          ))}
          {/* SF venue sub-labels */}
          <text x={colX[3]+MW/2} y={19} textAnchor="middle" fontSize={6.5} fill="#334155" fontFamily="system-ui">Dallas · Atlanta</text>

          <g transform={`translate(0,${LH})`}>
            {/* ── Connectors R32→R16 ── */}
            {Array.from({length:8},(_,i)=><g key={i}>
              <Cn x1={colX[0]+MW} y1={r32Y[i*2]} x2={colX[1]} y2={r16Y[i]}/>
              <Cn x1={colX[0]+MW} y1={r32Y[i*2+1]} x2={colX[1]} y2={r16Y[i]}/>
            </g>)}
            {/* ── Connectors R16→QF ── */}
            {Array.from({length:4},(_,i)=><g key={i}>
              <Cn x1={colX[1]+MW} y1={r16Y[i*2]} x2={colX[2]} y2={qfY[i]}/>
              <Cn x1={colX[1]+MW} y1={r16Y[i*2+1]} x2={colX[2]} y2={qfY[i]}/>
            </g>)}
            {/* ── Connectors QF→SF ── */}
            {Array.from({length:2},(_,i)=><g key={i}>
              <Cn x1={colX[2]+MW} y1={qfY[i*2]} x2={colX[3]} y2={sfY[i]}/>
              <Cn x1={colX[2]+MW} y1={qfY[i*2+1]} x2={colX[3]} y2={sfY[i]}/>
            </g>)}
            {/* ── Connectors SF→Final ── */}
            <Cn x1={colX[3]+MW} y1={sfY[0]} x2={colX[4]} y2={finY}/>
            <Cn x1={colX[3]+MW} y1={sfY[1]} x2={colX[4]} y2={finY}/>
            {/* separator line between halves */}
            <line x1={colX[0]} y1={(r32Y[7]+r32Y[8])/2} x2={colX[3]+MW} y2={(r32Y[7]+r32Y[8])/2}
              stroke="rgba(250,204,21,0.08)" strokeWidth={1} strokeDasharray="4,4"/>
            {/* ── R32 ── */}
            {Array.from({length:16},(_,vi)=>{const m=gM('r32',R32_VIS[vi]);return<MC key={vi} x={colX[0]} y={r32Y[vi]} lbl={R32_LBL[vi]} {...m}/>;}) }
            {/* ── R16 ── */}
            {Array.from({length:8},(_,i)=>{const m=gM('r16',i);return<MC key={i} x={colX[1]} y={r16Y[i]} lbl={R16_LBL[i]} {...m}/>;}) }
            {/* ── QF ── */}
            {Array.from({length:4},(_,i)=>{const m=gM('qf',i);return<MC key={i} x={colX[2]} y={qfY[i]} lbl={QF_LBL[i]} {...m}/>;}) }
            {/* ── SF ── */}
            {Array.from({length:2},(_,i)=>{const m=gM('sf',i);return<MC key={i} x={colX[3]} y={sfY[i]} lbl={SF_LBL[i]} {...m}/>;}) }
            {/* ── Final ── */}
            {(()=>{const m=gM('final',0);return<MC x={colX[4]} y={finY} lbl="\U0001f3c6 FINAL" {...m}/>;})()}
            {/* ── 3rd place ── */}
            {(()=>{
              const m=gM('third',0);
              return<g>
                <text x={colX[4]+MW/2} y={thirdY-TH-3} textAnchor="middle" fontSize={7} fill="#4a5568" fontFamily="system-ui">\U0001f3c5 3er Puesto</text>
                <MC x={colX[4]} y={thirdY} lbl="" {...m}/>
              </g>;
            })()}
            {/* Champion callout */}
            {(()=>{
              const w=koData.final?.[0]?.winner;
              if(!w)return null;
              return<g>
                <text x={colX[4]+MW/2} y={finY+TH+13} textAnchor="middle" fontSize={9} fill="#facc15" fontWeight="bold" fontFamily="system-ui">\u2605 {w}</text>
              </g>;
            })()}
          </g>
        </svg>
      </div>
      <div style={{textAlign:'center',fontSize:10,color:'#1e293b',paddingTop:2}}>
        \u2190 desliza para ver todas las rondas \u2192
      </div>
    </div>
  );
}


/* ═══ VISTA PÚBLICA ══════════════════════════════════ */
function PlayerModal({p,pred,actual,onClose}){
  const ko=pred?.knockout||{};const champion=ko.final?.[0]?.winner||"";
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div style={{width:"100%",maxWidth:640,background:"#0d1529",borderRadius:"18px 18px 0 0",maxHeight:"85vh",overflow:"hidden",display:"flex",flexDirection:"column"}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:"14px 16px 10px",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1}}><div style={{fontWeight:800,fontSize:16}}>{p.name}</div>{champion&&<div style={{fontSize:12,color:"#facc15"}}>🏆 {fl(champion)}</div>}</div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.08)",border:"none",color:"#94a3b8",borderRadius:8,padding:"6px 11px",cursor:"pointer"}}>✕</button>
        </div>
        <div style={{overflowY:"auto",padding:"12px 16px",flex:1}}>
          {!pred&&<div style={{color:"#475569",textAlign:"center",padding:"32px 0"}}>Sin predicciones.</div>}
          {pred&&<>
            {(ko.sf?.[0]?.winner||champion)&&<div style={{marginBottom:12}}>
              <div style={{fontSize:10,color:"#64748b",fontWeight:700,marginBottom:6}}>CAMINO A LA FINAL</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
                {champion&&<div style={{gridColumn:"1/-1",background:"rgba(250,204,21,0.08)",border:"1px solid rgba(250,204,21,0.2)",borderRadius:9,padding:"8px",textAlign:"center"}}><div style={{fontSize:9,color:"#a78bfa"}}>🏆 Campeón</div><div style={{fontWeight:800,fontSize:16,color:"#facc15"}}>{fl(champion)}</div></div>}
                {[0,1].map(i=>{const w=ko.sf?.[i]?.winner;return w?<div key={i} style={{background:"rgba(255,255,255,0.04)",borderRadius:9,padding:"6px 8px"}}><div style={{fontSize:9,color:"#64748b"}}>🌟 Finalista {i+1}</div><div style={{fontSize:11,fontWeight:700}}>{fl(w)}</div></div>:null;})}
              </div>
            </div>}
            {pred.groups&&<><div style={{fontSize:10,color:"#64748b",fontWeight:700,marginBottom:5}}>GRUPOS</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,marginBottom:10}}>
              {GK.map(g=>{const pg=pred.groups?.[g];const ag=actual?.groups?.[g];if(!pg?.first&&!pg?.second)return null;
                return<div key={g} style={{background:"rgba(255,255,255,0.03)",borderRadius:8,padding:"5px 8px"}}>
                  <div style={{fontSize:9,color:"#475569",fontWeight:700}}>Grupo {g}</div>
                  {[["first","1°",3],["second","2°",2]].map(([pos,lbl])=>{const ok=ag?.[pos]&&pg?.[pos]===ag[pos];return<div key={pos} style={{fontSize:10,display:"flex",gap:3}}><span style={{color:!ag?.[pos]?"#334155":ok?"#4ade80":"#f87171"}}>{!ag?.[pos]?"·":ok?"✓":"✗"}</span><span style={{color:ok?"white":"#94a3b8"}}>{lbl} {pg?.[pos]?fl(pg[pos]):"—"}</span></div>;})}
                </div>;})}
            </div></>}
            {pred.thirds?.some(Boolean)&&<><div style={{fontSize:10,color:"#64748b",fontWeight:700,marginBottom:4}}>MEJORES 3ROS</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:10}}>{pred.thirds.map((t,i)=>t?<span key={i} style={{background:"rgba(168,85,247,0.12)",border:"1px solid rgba(168,85,247,0.2)",borderRadius:6,padding:"2px 7px",fontSize:10,color:"#c084fc"}}>#{i+1} {fl(t)}</span>:null)}</div></>}
          </>}
        </div>
      </div>
    </div>
  );
}

function PublicView({data}){
  const{players=[],predictions={},actual={}}=data;
  const[sel,setSel]=useState(null);
  const sorted=[...players].map(p=>({...p,sc:calcScore(predictions[p.id],actual),champion:predictions[p.id]?.knockout?.final?.[0]?.winner||""})).sort((a,b)=>b.sc.total-a.sc.total);
  const realChamp=actual?.knockout?.final?.[0]?.winner||"";
  return(
    <div style={{padding:16}}>
      {sel&&<PlayerModal p={sel} pred={predictions[sel.id]} actual={actual} onClose={()=>setSel(null)}/>}
      <div style={{fontWeight:900,fontSize:20,marginBottom:4}}>🌎 Apuestas de Todos</div>
      <div style={{fontSize:11,color:"#64748b",marginBottom:12}}>Solo lectura · toca un nombre para ver sus picks</div>
      {realChamp&&<div style={{background:"rgba(250,204,21,0.08)",border:"1px solid rgba(250,204,21,0.2)",borderRadius:12,padding:"10px",marginBottom:12,textAlign:"center"}}><div style={{fontSize:10,color:"#64748b"}}>🏆 Campeón Real</div><div style={{fontWeight:900,fontSize:20,color:"#facc15"}}>{fl(realChamp)}</div></div>}
      {sorted.length===0&&<Card><div style={{textAlign:"center",color:"#475569",padding:"28px 0"}}>Aún no hay participantes.</div></Card>}
      {sorted.map((p,i)=>{const medal=["🥇","🥈","🥉"][i]||`${i+1}`;const hit=p.champion&&realChamp&&p.champion===realChamp;
        return<div key={p.id} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,marginBottom:6,padding:"10px 12px",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setSel(p)}>
          <div style={{fontWeight:900,fontSize:16,color:"#64748b",minWidth:26}}>{medal}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:14}}>{p.name}</div>
            {p.champion&&<div style={{fontSize:11,marginTop:2,color:hit?"#4ade80":"#94a3b8",fontWeight:hit?700:400}}>🏆 {fl(p.champion)}{hit?" ✓ ¡Acertó!":""}</div>}
          </div>
          <div style={{textAlign:"right"}}><div style={{fontWeight:900,fontSize:22,color:"#facc15",lineHeight:1}}>{p.sc.total}</div><div style={{fontSize:9,color:"#475569"}}>pts</div></div>
          <span style={{color:"#334155"}}>›</span>
        </div>;})}
      {/* Reglas */}
      <div style={{marginTop:20,fontWeight:900,fontSize:16,marginBottom:8}}>📋 Reglas de Puntuación</div>
      <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"14px",fontSize:12}}>
        <div style={{color:"#facc15",fontWeight:700,marginBottom:8}}>Máximo: 155 puntos</div>
        <div style={{color:"#93c5fd",fontWeight:700,marginBottom:4}}>Grupos (hasta 60 pts)</div>
        <div style={{color:"#94a3b8",marginBottom:8}}>1° correcto → <b style={{color:"white"}}>3 pts</b> · 2° correcto → <b style={{color:"white"}}>2 pts</b></div>
        <div style={{color:"#93c5fd",fontWeight:700,marginBottom:6}}>Eliminatorias (hasta 95 pts) — solo acertar al ganador</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:"3px 8px",fontSize:11,marginBottom:10}}>
          {[["16avos","2"],["Octavos","3"],["Cuartos","4"],["Semis","5"],["3er puesto","3"],["🏆 Final","10"]].map(([r,p])=><React.Fragment key={r}><span style={{color:"#94a3b8"}}>{r}</span><span style={{color:"white",fontWeight:700}}>{p} pts</span></React.Fragment>)}
        </div>
        <div style={{background:"rgba(250,204,21,0.06)",borderRadius:8,padding:"7px 10px",marginBottom:6,fontSize:11,color:"#94a3b8"}}>Solo eliges <b style={{color:"#facc15"}}>quién gana cada cruce</b> — sin marcadores. Acertar las rondas finales es la clave.</div>
        <div style={{background:"rgba(34,197,94,0.07)",borderRadius:8,padding:"7px 10px",fontSize:11,color:"#94a3b8"}}><b style={{color:"#4ade80"}}>💰 Premio:</b> 🥇 1° lugar → <b style={{color:"white"}}>70% del pozo</b> · 🥈 2° → <b style={{color:"white"}}>30%</b></div>
      </div>
    </div>
  );
}

function Nav({view,setView,session,onLogout}){
  const items=[{k:"public",ic:"🌎",l:"Todos"},{k:"home",ic:"🏠",l:"Inicio"},{k:"picks",ic:"📋",l:"Picks"},{k:"bracket",ic:"🏆",l:"Bracket"},{k:"tree",ic:"🗺️",l:"Llaves"},{k:"score",ic:"📊",l:"Score"},{k:"admin",ic:"🔐",l:"Admin"}];
  return<div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(6,12,26,0.97)",borderTop:"1px solid rgba(255,255,255,0.08)",display:"flex",padding:"8px 4px 12px",backdropFilter:"blur(20px)",zIndex:200,maxWidth:640,margin:"0 auto"}}>
    {items.map(it=>{const active=view===it.k;return<button key={it.k} onClick={()=>setView(it.k)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 2px",background:"none",border:"none",cursor:"pointer",color:active?"#facc15":"#475569"}}><span style={{fontSize:19}}>{it.ic}</span><span style={{fontSize:9,fontWeight:active?700:400}}>{it.l}</span></button>;})}
    {session&&<button onClick={onLogout} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 2px",background:"none",border:"none",cursor:"pointer",color:"#475569"}}><span style={{fontSize:19}}>🚪</span><span style={{fontSize:9}}>Salir</span></button>}
  </div>;
}

/* ═══════════════════════════════════════
   APP
═══════════════════════════════════════ */
function App(){
  const[data,setData]=useState(null);const[view,setView]=useState("public");const[session,setSession]=useState(null);
  useEffect(()=>{
    let timer;
    const load=()=>dbGet().then(raw=>setData(fixData(raw))).catch(console.error);
    load();
    timer=setInterval(load,30000);
    return()=>clearInterval(timer);
  },[]);
  const update=useCallback(patch=>{
    setData(prev=>({...prev,...patch}));
    Object.entries(patch).forEach(([k,v])=>dbSet(k,v).catch(console.error));
  },[]);
  const savePred=(pid,pred)=>update({predictions:{...data.predictions,[pid]:pred}});
  const handleReg=(name,pin)=>{const id=genId();update({players:[...(data.players||[]),{id,name,pin,paid:false,registeredAt:Date.now()}]});setSession({playerId:id,name});setView("picks");};
  if(!DB_CONFIGURADA)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#060c1a",color:"white",gap:14,padding:24,textAlign:"center"}}>
      <span style={{fontSize:52}}>🔧</span>
      <div style={{fontWeight:800,fontSize:18}}>Falta configurar la base de datos</div>
      <div style={{color:"#94a3b8",fontSize:13,maxWidth:420,lineHeight:1.6}}>Abre el archivo <b style={{color:"#facc15"}}>index.html</b>, busca la línea <b style={{color:"#facc15"}}>FIREBASE_URL</b> y pega la URL de tu Realtime Database de Firebase (termina en <b>firebaseio.com</b>). Luego guarda y recarga.</div>
    </div>
  );
  if(!data)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"#060c1a",color:"white",gap:14}}>
      <span style={{fontSize:52}}>⚽</span>
      <div style={{fontWeight:800,fontSize:16}}>Polla Familiar 2026</div>
      <span style={{color:"#64748b",fontSize:13}}>Conectando…</span>
    </div>
  );
  return(
    <div style={{background:"#060c1a",minHeight:"100vh",color:"white",maxWidth:640,margin:"0 auto",paddingBottom:88}}>
      <div style={{background:"linear-gradient(165deg,#0c1f5c,#0a1535)",borderBottom:"1px solid rgba(250,204,21,0.15)",padding:"12px 16px",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,borderRadius:9,background:"linear-gradient(135deg,#1e3a8a,#1d4ed8)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>⚽</div>
          <div style={{flex:1}}><div style={{fontWeight:800,fontSize:15}}>Polla Familiar 2026</div><div style={{fontSize:10,color:"#475569"}}>{session?`👤 ${session.name} · `:""}Simulación completa · {MAX_PTS} pts máx.</div></div>
          <div style={{textAlign:"right",flexShrink:0}}>
  <div style={{fontWeight:900,fontSize:18,color:"#facc15",lineHeight:1}}>${data.players.filter(p=>p.paid).length*data.settings.potAmount}</div>
  <div style={{fontSize:9,color:"#475569"}}>pozo total</div>
  <div style={{fontSize:9,color:"#4ade80"}}>🥇{Math.floor(data.players.filter(p=>p.paid).length*data.settings.potAmount*.7)} · 🥈{Math.floor(data.players.filter(p=>p.paid).length*data.settings.potAmount*.3)}</div>
</div>
        </div>
      </div>
      {view==="public"&&<PublicView data={data}/>}
      {view==="home"&&<HomeView data={data} session={session} onLogin={s=>setSession(s)} setView={setView}/>}
      {view==="register"&&<RegisterView data={data} onRegister={handleReg} setView={setView}/>}
      {view==="picks"&&<PicksView data={data} session={session} onSave={savePred} setView={setView}/>}
      {view==="bracket"&&<BracketView data={data} session={session} onSave={savePred} setView={setView}/>}
      {view==="score"&&<ScoreView data={data} session={session} setView={setView}/>}
      {view==="tree"&&<BracketTreeView data={data} session={session}/>}
      {view==="admin"&&<AdminView data={data} onUpdate={update} setView={setView}/>}
      <Nav view={view} setView={setView} session={session} onLogout={()=>{setSession(null);setView("home");}}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
